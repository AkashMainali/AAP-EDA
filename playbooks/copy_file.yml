---
- name: Copy new file to central storage
  hosts: all
  gather_facts: false
  vars:
    backup_dir: C:/backup
  tasks:

    - name: Get Complete payload
      ansible.builtin.debug:
        var: ansible_eda.event.payload

    - name: Create clean timestamp for filename
      ansible.builtin.set_fact:
        clean_timestamp: "{{ ansible_eda.event.payload.timestamp | regex_replace('[:Z]', '-') }}"

    - name: Get basename of source file
      ansible.builtin.set_fact:
        # Use regex to extract just the filename from a Windows path
        source_basename: "{{ ansible_eda.event.payload.path | regex_replace('^.*\\\\', '') | regex_replace('[^a-zA-Z0-9._-]', '_') }}"

    - name: Normalize path separators
      ansible.builtin.set_fact:
        normalized_path: "{{ ansible_eda.event.payload.path | regex_replace('\\\\\\\\', '\\\\') }}"

    - name: Copy the backup file
      ansible.windows.win_copy:
        src: "{{ normalized_path }}"
        dest: "{{ backup_dir }}\\{{ clean_timestamp }}{{ source_basename }}"
        remote_src: true
      register: copy_result

    - name: Show backup location
      ansible.builtin.debug:
        msg: "Backup created at: {{ copy_result.dest }}"