---
version: 3

images:
  base_image:
    name: registry.redhat.io/ansible-automation-platform-25/de-minimal-rhel9:latest

dependencies:
  galaxy:
    collections:
      - name: ansible.eda
      - name: ansible.windows
      - name: community.windows
  python:
    - ansible-core>=2.15.0
    - ansible-runner>=2.3.0
    - pywinrm
    - requests-ntlm
    - systemd-python
    - six
    - gssapi
  system:
    - python3.11
    - python3.11-pip
    - krb5-libs
    - systemd-libs
    - which

options:
  package_manager_path: /usr/bin/microdnf
  skip_ansible_check: true

additional_build_steps:
  prepend_base:
    - RUN microdnf install -y python3.11-devel gcc krb5-devel systemd-devel pkgconf-pkg-config
    - RUN alternatives --install /usr/bin/python3 python3 /usr/bin/python3.11 1 && alternatives --set python3 /usr/bin/python3.11
  append_final:
    - RUN microdnf remove -y gcc python3.11-devel krb5-devel systemd-devel pkgconf-pkg-config && microdnf clean all
    - ENV PYCMD=/usr/bin/python3.11