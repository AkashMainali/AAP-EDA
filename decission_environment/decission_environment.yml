---
version: 3

images:
  base_image:
    name: aap-gateway.apps.ocp419.crucible.iisl.com/de-supported-rhel9:latest
    #name: registry.redhat.io/ansible-automation-platform-25/de-minimal-rhel9:latest
dependencies:
  galaxy:
    collections:
      - name: ansible.eda
      - name: ansible.windows
      - name: community.windows
  python:
    - ansible-core>=2.15.0
    - ansible-runner>=2.3.0
    - pywinrm
    - requests-ntlm
    - systemd-python
    - six
    - gssapi
  system:
    - python3.11
    - python3.11-pip
    - python3.11-setuptools
    - python3.11-devel
    - java-17-openjdk-headless
    - pkgconf-pkg-config
    - gcc
    - systemd-devel
    - krb5-devel
    - which

options:
  package_manager_path: /usr/bin/microdnf

additional_build_steps:
  prepend_base:
    # 1. Install Python 3.11 and C-headers
    - RUN microdnf install -y python3.11 python3.11-pip systemd-devel pkgconf-pkg-config gcc krb5-devel
    # 2. Force the 'python3' command to point to 3.11 so the builder's check succeeds
    - RUN alternatives --set python3 /usr/bin/python3.11
    - RUN python3 -m pip install --upgrade pip
  append_final:
    - RUN ansible-galaxy collection list
    - ENV JAVA_HOME=/usr/lib/jvm/jre-17-openjdk
    - ENV PATH=$PATH:$JAVA_HOME/bin