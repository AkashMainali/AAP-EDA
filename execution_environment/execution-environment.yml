---
version: 3

build_arg_defaults:
  ANSIBLE_GALAXY_CLI_COLLECTION_OPTS: '--pre'

images:
  base_image:
    name: registry.redhat.io/ansible-automation-platform-26/ee-supported-rhel9:latest

dependencies:
  galaxy: requirements.yml
  python: requirements.txt
  ansible_core:
    package_pip: ansible-core>=2.15.0
  ansible_runner:
    package_pip: ansible-runner>=2.3.0

additional_build_steps:
  prepend_base:
    - RUN ln -sf /usr/bin/microdnf /usr/bin/dnf
    - RUN microdnf install -y --nodocs gcc make krb5-devel libssh-devel python3-devel pkg-config systemd-devel systemd-libs libxml2-devel libcurl-devel openssl-devel && microdnf clean all
    - RUN $PYCMD -m pip install --no-cache-dir "ansible-core>=2.15.0" "ansible-runner>=2.3.0" packaging pyyaml bindep

  prepend_galaxy:
    - ENV PKGMGR_OPTS="--nodocs --setopt=install_weak_deps=0"

  prepend_builder:
    - RUN $PYCMD -m pip install --no-cache-dir systemd-python

  prepend_final:
    - RUN microdnf install -y --nodocs gcc make krb5-devel libssh-devel python3-devel pkg-config systemd-devel systemd-libs libxml2-devel libcurl-devel openssl-devel python3-cffi python3-cryptography python3-jmespath python3-lxml python3-netaddr && microdnf clean all

  append_final:
    - RUN echo "Windows EE build complete"