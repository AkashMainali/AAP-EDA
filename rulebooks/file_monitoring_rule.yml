---
- name: Watch for new and modified files on Windows
  hosts: localhost

  sources:
    - name: File Monitor
      ansible.eda.webhook:
        host: 0.0.0.0
        port: 5000
        endpoint: /test

  rules:
    - name: New file created
      condition: event.payload.event_type == 'created'
      action:
        run_job_template:
          name: "Windows File Audit - Created"
          organization: "Default"
          extra_vars:              # <- move extra_vars here
            eda_payload: "{{ event.payload }}"

    - name: File modified
      condition: event.payload.event_type == 'modified'
      action:
        run_job_template:
          name: "Windows File Audit - Modified"
          organization: "Default"
          extra_vars:
            eda_payload: "{{ event.payload }}"
